name: Build Linux

on:
  workflow_dispatch:        # trigger manually from the Actions tab
  push:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Pinned to a known-good commit so the moving branch can't break the build again.
      - name: Checkout garrysmod_common (pinned)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          repository: danielga/garrysmod_common
          path: garrysmod_common
          ref: 069a789df06d675d294961a20e8736aa070bd355   # x86-64-support-sourcesdk @ 2026-05

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool curl

      # The repo doesn't ship libopus; build it static + PIC and drop it where premake expects.
      - name: Build static opus
        run: |
          curl -sL https://downloads.xiph.org/releases/opus/opus-1.4.tar.gz -o opus.tgz
          tar -xf opus.tgz
          cd opus-1.4
          ./configure --enable-static --disable-shared --with-pic
          make -j"$(nproc)"
          cd ..
          mkdir -p opus/lib64
          cp opus-1.4/.libs/libopus.a opus/lib64/

      - name: Install premake5 (beta6 — beta2 lacks linktimeoptimization)
        run: |
          curl -sL https://github.com/premake/premake-core/releases/download/v5.0.0-beta6/premake-5.0.0-beta6-linux.tar.gz -o premake.tar.gz
          tar -xf premake.tar.gz
          chmod +x premake5

      - name: Generate project
        run: ./premake5 --gmcommon=garrysmod_common gmake2

      - name: Build (x86_64, releasewithsymbols)
        run: |
          cd projects/linux/gmake          # note: gmake, not gmake2
          make config=releasewithsymbols_x86_64 gmsv_eightbit

      - name: Show artifact
        run: file projects/linux/gmake/x86_64/ReleaseWithSymbols/gmsv_eightbit_linux64.dll

      - uses: actions/upload-artifact@v4
        with:
          name: gmsv_eightbit_linux64
          path: projects/linux/gmake/x86_64/ReleaseWithSymbols/gmsv_eightbit_linux64.dll
          if-no-files-found: error
