name: Build Linux

on:
  workflow_dispatch:        # trigger manually from the Actions tab
  push:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-24.04   # glibc 2.39 — required by premake beta6 (needs >= 2.38)
    steps:
      - uses: actions/checkout@v4

      # Pinned to a known-good commit so the moving branch can't break the build again.
      - name: Checkout garrysmod_common (pinned)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          repository: danielga/garrysmod_common
          path: garrysmod_common
          ref: 069a789df06d675d294961a20e8736aa070bd355   # x86-64-support-sourcesdk @ 2026-05

      - name: Install toolchain (incl. 32-bit multilib)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib g++-multilib \
                                  autoconf automake libtool curl

      # The repo doesn't ship libopus, so build it static + PIC for each arch
      # and drop it where premake5.lua expects (opus/lib64 and opus/lib32).
      - name: Build static opus (x86_64)
        run: |
          curl -sL https://downloads.xiph.org/releases/opus/opus-1.4.tar.gz -o opus.tgz
          mkdir opus64 && tar -xf opus.tgz -C opus64 --strip-components=1
          cd opus64
          ./configure --enable-static --disable-shared --with-pic
          make libopus.la -j"$(nproc)"
          cd ..
          mkdir -p opus/lib64 && cp opus64/.libs/libopus.a opus/lib64/

      - name: Build static opus (x86 / 32-bit)
        run: |
          mkdir opus32 && tar -xf opus.tgz -C opus32 --strip-components=1
          cd opus32
          ./configure --enable-static --disable-shared --with-pic \
                      --host=i686-linux-gnu CC="gcc -m32"
          make libopus.la -j"$(nproc)"
          cd ..
          mkdir -p opus/lib32 && cp opus32/.libs/libopus.a opus/lib32/

      - name: Install premake5 (beta6 — beta2 lacks linktimeoptimization)
        run: |
          curl -sL https://github.com/premake/premake-core/releases/download/v5.0.0-beta6/premake-5.0.0-beta6-linux.tar.gz -o premake.tar.gz
          tar -xf premake.tar.gz
          chmod +x premake5

      # Requires PROJECT_GENERATOR_VERSION = 3 in premake5.lua to expose the x86_64 platform.
      - name: Generate project
        run: ./premake5 --gmcommon=garrysmod_common gmake2

      - name: Build 64-bit (gmsv_eightbit_linux64.dll)
        run: |
          cd projects/linux/gmake          # note: gmake, not gmake2
          make config=releasewithsymbols_x86_64 gmsv_eightbit

      - name: Build 32-bit (gmsv_eightbit_linux.dll)
        run: |
          cd projects/linux/gmake
          make config=releasewithsymbols_x86 gmsv_eightbit

      - name: Show artifacts
        run: |
          file projects/linux/gmake/x86_64/ReleaseWithSymbols/gmsv_eightbit_linux64.dll
          file projects/linux/gmake/x86/ReleaseWithSymbols/gmsv_eightbit_linux.dll

      - uses: actions/upload-artifact@v4
        with:
          name: gmsv_eightbit_linux
          path: |
            projects/linux/gmake/x86_64/ReleaseWithSymbols/gmsv_eightbit_linux64.dll
            projects/linux/gmake/x86/ReleaseWithSymbols/gmsv_eightbit_linux.dll
          if-no-files-found: error
